<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kanban PM</title>
    <style>
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #f7f8fb;
        color: #032147;
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .card {
        background: #fff;
        border: 1px solid rgba(3, 33, 71, 0.08);
        border-radius: 16px;
        padding: 32px 40px;
        box-shadow: 0 18px 40px rgba(3, 33, 71, 0.12);
        text-align: center;
      }
      h1 { color: #032147; margin: 0 0 8px; }
      p { color: #888; margin: 4px 0; }
      #status { font-weight: 600; color: #209dd7; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Kanban PM</h1>
      <p>Hello world. Scaffolding is up.</p>
      <p>API health: <span id="status">checking...</span></p>
    </div>
    <script>
      fetch("/api/health")
        .then((r) => r.json())
        .then((d) => {
          document.getElementById("status").textContent = d.status;
        })
        .catch(() => {
          document.getElementById("status").textContent = "unreachable";
        });
    </script>
  </body>
</html>
